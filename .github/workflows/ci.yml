name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run engine test suite with coverage
        run: bun test --coverage
